# =============================================================================
# Hermes Agent - 生产配置 (直接复制到 ~/.hermes/config.yaml)
# =============================================================================

# =============================================================================
# 模型配置
# =============================================================================
# 主模型: GLM-5 via OpenRouter (智谱旗舰 745B MoE, 80K 上下文)
# 专为复杂系统设计和长周期 Agent 工作流优化
# 定价: 输入 $0.72/M tokens, 输出 $2.30/M tokens
#
# 备选方案:
#   - 通过 NVIDIA NIM 直连 (免费, 但 GLM-5 将于 4/20 弃用, 建议切 GLM-5.1):
#     provider: "custom"
#     base_url: "https://integrate.api.nvidia.com/v1"
#     default: "z-ai/glm-5.1"
#   - 通过 Z.AI 直连:
#     provider: "zai"
#     default: "glm-5"
model:
  default: "z-ai/glm-5"
  provider: "openrouter"
  base_url: "https://openrouter.ai/api/v1"

# =============================================================================
# 智能模型路由 (省钱利器)
# =============================================================================
# 简短/简单问题自动切换到免费模型，复杂问题保持主模型
smart_model_routing:
  enabled: true
  max_simple_chars: 160
  max_simple_words: 28
  cheap_model:
    provider: openrouter
    model: nvidia/nemotron-3-nano-30b-a3b:free

# =============================================================================
# 终端工具配置
# =============================================================================
terminal:
  backend: "local"
  cwd: "."
  timeout: 180
  lifetime_seconds: 300
  persistent_shell: true
  container_cpu: 1
  container_memory: 5120
  container_disk: 51200
  container_persistent: true

# =============================================================================
# 浏览器工具
# =============================================================================
browser:
  inactivity_timeout: 120
  command_timeout: 30
  record_sessions: false
  allow_private_urls: false

# =============================================================================
# 上下文压缩 (自动压缩长对话)
# =============================================================================
compression:
  enabled: true
  threshold: 0.50
  target_ratio: 0.20
  protect_last_n: 20

# =============================================================================
# 辅助模型配置 (全部使用免费模型，辅助任务零成本)
# =============================================================================
auxiliary:
  # 视觉分析 - Gemma 4 26B MoE 免费，支持视觉，262K 上下文
  vision:
    provider: "openrouter"
    model: "google/gemma-4-26b-a4b-it:free"
    timeout: 120
    download_timeout: 30

  # 网页提取 - Nemotron 3 Super 免费，120B MoE，262K 上下文
  web_extract:
    provider: "openrouter"
    model: "nvidia/nemotron-3-super-120b-a12b:free"
    timeout: 360

  # 上下文压缩 - Nemotron 3 Nano 免费，30B MoE，256K 上下文
  compression:
    provider: "openrouter"
    model: "nvidia/nemotron-3-nano-30b-a3b:free"
    timeout: 120

  # 危险命令审批 - Nemotron Nano 9B 免费，极低延迟
  approval:
    provider: "openrouter"
    model: "nvidia/nemotron-nano-9b-v2:free"
    timeout: 30

  # 会话搜索 - 简单摘要，越快越便宜
  session_search:
    provider: "openrouter"
    model: "nvidia/nemotron-nano-9b-v2:free"
    timeout: 30

  # 技能中心
  skills_hub:
    provider: "openrouter"
    model: "nvidia/nemotron-nano-9b-v2:free"
    timeout: 30

  # MCP 工具分发
  mcp:
    provider: "openrouter"
    model: "nvidia/nemotron-nano-9b-v2:free"
    timeout: 30

  # 记忆刷写 - 需要一点推理能力
  flush_memories:
    provider: "openrouter"
    model: "google/gemma-4-31b-it:free"
    timeout: 30

# =============================================================================
# 持久化记忆系统 + Honcho 外部记忆
# =============================================================================
memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375
  nudge_interval: 10
  flush_min_turns: 6
  provider: honcho

# =============================================================================
# Honcho 详细配置
# =============================================================================
honcho:
  session_strategy: "per-directory"
  recall_mode: "hybrid"
  observation_mode: "directional"
  write_frequency: "async"

# =============================================================================
# 技能系统
# =============================================================================
skills:
  creation_nudge_interval: 15

# =============================================================================
# Agent 行为
# =============================================================================
agent:
  max_turns: 90
  verbose: false
  reasoning_effort: "medium"
  tool_use_enforcement: "auto"
  gateway_timeout: 1800
  gateway_timeout_warning: 900
  gateway_notify_interval: 600

# =============================================================================
# 平台工具集配置
# =============================================================================
platform_toolsets:
  cli: [hermes-cli]
  # telegram: [terminal, file, web, vision, image_gen, browser, skills, todo, cronjob, send_message]

# =============================================================================
# MCP 服务器配置
# =============================================================================
mcp_servers:
  github:
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-github"]
    env:
      GITHUB_PERSONAL_ACCESS_TOKEN: "${GITHUB_PERSONAL_ACCESS_TOKEN}"
    tools:
      include: [list_issues, create_issue, update_issue, search_repositories, get_file_contents, create_or_update_file_contents]
      prompts: false
      resources: false

  time:
    command: "uvx"
    args: ["mcp-server-time"]

# =============================================================================
# 语音转文字 (STT)
# =============================================================================
stt:
  enabled: true
  provider: "local"
  local:
    model: "base"

# =============================================================================
# 文字转语音 (TTS)
# =============================================================================
tts:
  provider: "edge"
  edge:
    voice: "zh-CN-XiaoxiaoNeural"

# =============================================================================
# 安全配置
# =============================================================================
security:
  redact_secrets: true

approvals:
  mode: "smart"
  timeout: 60

command_allowlist:
  - "git status"
  - "git log"
  - "git diff"
  - "ls"
  - "cat"
  - "pwd"
  - "echo"

# =============================================================================
# 会话重置策略
# =============================================================================
session_reset:
  mode: both
  idle_minutes: 1440
  at_hour: 4

group_sessions_per_user: true

# =============================================================================
# 流式传输
# =============================================================================
streaming:
  enabled: false

# =============================================================================
# 显示配置
# =============================================================================
display:
  compact: false
  tool_progress: all
  busy_input_mode: interrupt
  bell_on_complete: false
  show_reasoning: false
  streaming: true
  skin: default
  inline_diffs: true
  show_cost: false
  interim_assistant_messages: true

# =============================================================================
# 文件系统检查点
# =============================================================================
checkpoints:
  enabled: true
  max_snapshots: 50

# =============================================================================
# 代码执行沙箱
# =============================================================================
code_execution:
  timeout: 300
  max_tool_calls: 50

# =============================================================================
# 子代理委托
# =============================================================================
delegation:
  max_iterations: 50
  default_toolsets: ["terminal", "file", "web"]
  model: "nvidia/nemotron-3-nano-30b-a3b:free"
  provider: "openrouter"

# =============================================================================
# 模型别名 (快速切换模型的快捷方式)
# =============================================================================
model_aliases:
  opus:
    model: claude-opus-4.6
    provider: anthropic
  sonnet:
    model: claude-sonnet-4
    provider: anthropic
  flash:
    model: google/gemini-2.5-flash
    provider: openrouter
  glm5:
    model: z-ai/glm-5
    provider: openrouter
  glm51:
    model: z-ai/glm-5.1
    provider: openrouter
  glm:
    model: glm-4-plus
    provider: zai
  qwen:
    model: qwen3-235b-a22b
    provider: openrouter

# =============================================================================
# 时区
# =============================================================================
timezone: "Asia/Shanghai"
